name: Build Android APK

on:
  workflow_dispatch:

env:
  KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"
          pip install Pillow -q

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias mapadegastos \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Mapa de Gastos, OU=App, O=MapaDeGastos, L=Porto Alegre, ST=RS, C=BR"

      - name: Generate PNG icons
        run: |
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size, path):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              img = Image.new('RGBA', (size, size), (248, 247, 244, 255))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.rounded_rectangle([m, m, size-m, size-m], radius=size//6, fill=(224, 222, 214, 255))
              pad = size // 4
              thick = max(3, size // 14)
              color = (153, 60, 29, 255)
              x1, x2 = pad, size - pad
              y1, y2 = pad + size//10, size - pad - size//10
              ymid = y1 + (y2 - y1) // 2
              draw.rectangle([x1, y1, x1+thick, y2], fill=color)
              draw.rectangle([x2-thick, y1, x2, y2], fill=color)
              draw.line([x1+thick//2, y1, (x1+x2)//2, ymid], fill=color, width=thick)
              draw.line([x2-thick//2, y1, (x1+x2)//2, ymid], fill=color, width=thick)
              img.save(path, 'PNG')
              print(f"Icon {size}px -> {path}")

          base = 'twa-app/app/src/main/res'
          make_icon(48,  f'{base}/mipmap-mdpi/ic_launcher.png')
          make_icon(72,  f'{base}/mipmap-hdpi/ic_launcher.png')
          make_icon(96,  f'{base}/mipmap-xhdpi/ic_launcher.png')
          make_icon(144, f'{base}/mipmap-xxhdpi/ic_launcher.png')
          make_icon(192, f'{base}/mipmap-xxxhdpi/ic_launcher.png')
          PYEOF

      - name: Create project structure
        run: |
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/res/drawable

      - name: Write settings.gradle
        run: |
          cat > twa-app/settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "MapaDeGastos"
          include ':app'
          EOF

      - name: Write build.gradle (root)
        run: |
          cat > twa-app/build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.2.2' apply false
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > twa-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Write app build.gradle
        run: |
          cat > twa-app/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'br.com.mapadegastos.app'
            compileSdk 34
            defaultConfig {
              applicationId 'br.com.mapadegastos.app'
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName '1.0.0'
            }
            signingConfigs {
              release {
                storeFile file('../../keystore.jks')
                storePassword System.getenv('KEYSTORE_PASSWORD')
                keyAlias 'mapadegastos'
                keyPassword System.getenv('KEYSTORE_PASSWORD')
              }
            }
            buildTypes {
              release {
                minifyEnabled false
                signingConfig signingConfigs.release
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

      - name: Write AndroidManifest.xml
        run: |
          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:label="@string/app_name"
              android:theme="@style/Theme.LauncherActivity">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://cade-o-salario.vercel.app" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimary" />
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                  android:value="300" />
                <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                  android:value="br.com.mapadegastos.app.fileprovider" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="https" android:host="cade-o-salario.vercel.app" />
                </intent-filter>
              </activity>
              <provider
                android:name="androidx.core.content.FileProvider"
                android:authorities="br.com.mapadegastos.app.fileprovider"
                android:exported="false"
                android:grantUriPermissions="true">
                <meta-data android:name="android.support.FILE_PROVIDER_PATHS"
                  android:resource="@xml/file_paths" />
              </provider>
            </application>
          </manifest>
          EOF

      - name: Write resource files
        run: |
          cat > twa-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Mapa de Gastos</string>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#F8F7F4</color>
            <color name="backgroundColor">#F8F7F4</color>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.LauncherActivity" parent="android:Theme.NoTitleBar.Fullscreen">
              <item name="android:windowBackground">@color/backgroundColor</item>
            </style>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
            <external-path name="external_files" path="." />
          </paths>
          EOF

          cat > twa-app/app/src/main/res/drawable/splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#F8F7F4"/>
          </shape>
          EOF

      - name: Setup Gradle wrapper
        working-directory: twa-app
        run: gradle wrapper --gradle-version 8.4

      - name: Build APK
        working-directory: twa-app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mapa-de-gastos-apk
          path: twa-app/app/build/outputs/apk/release/*.apk
